name: Release

# Push a tag like v1.0.0 to build DiskSage.app and attach a zip to the Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build DiskSage.app
        run: Scripts/bundle.sh release

      - name: Zip the app bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent DiskSage.app DiskSage-macOS.zip
          shasum -a 256 DiskSage-macOS.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DiskSage-macOS
          path: dist/DiskSage-macOS.zip

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DiskSage-macOS.zip
          generate_release_notes: true
